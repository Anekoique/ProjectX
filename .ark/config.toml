# Ark configuration. Created by `ark init`; preserved by `ark upgrade`.
# Edit freely — your changes survive across upgrades. Sectioned by feature;
# missing sections fall through to the documented defaults.

[worktree]
# Where worktrees are stored, project-relative.
worktree_dir = ".ark/worktrees"

# Branch type prefix used when neither --branch-type nor --branch is passed.
# One of: feat, fix, refactor, chore, ci, docs.
branch_prefix = "feat"

# Files copied from the project root into each new worktree (e.g. `.env`).
# Source-not-found is a hard error — only list paths that exist at the
# project root. Note: `.ark/.developer` is synced automatically; do not
# add it here.
copy = []

# Shell commands run in the worktree directory after creation, in order,
# aborting on first non-zero exit. Default initializes git submodules in
# the new worktree (no-op in repos without `.gitmodules`). Set to `[]` to
# disable.
post_create = ["git submodule update --init --recursive"]

[workspace]
# Lines per journal file before rotation (`journal-N.md` -> `journal-{N+1}.md`).
# Must be greater than 0. Default 2000.
journal_max_lines = 2000

# Identity lives exclusively in `.ark/.developer` (gitignored). Bootstrap
# via `ark init --developer <name>` or write the file manually.
